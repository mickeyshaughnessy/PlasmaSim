<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Starbound Tactics</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="canvas"></canvas>

<div id="panel">
  <!-- Header -->
  <div id="panel-header">
    <h1>⭐ Starbound Tactics</h1>
    <div id="mode-badge">SOL SYSTEM</div>
  </div>

  <!-- Mode tabs -->
  <div id="mode-tabs">
    <button class="tab-btn active" id="tab-space">SPACE</button>
    <button class="tab-btn" id="tab-planet" disabled>PLANET</button>
    <button class="tab-btn" id="tab-galaxy">GALAXY</button>
  </div>

  <!-- Scrollable body -->
  <div id="panel-body">

    <!-- Status -->
    <div>
      <div class="section-title">STATUS</div>
      <div id="status-content"></div>
    </div>

    <div class="sep"></div>

    <!-- Radar -->
    <div>
      <div class="section-title">RADAR</div>
      <canvas id="radar" width="214" height="120"></canvas>
    </div>

    <div class="sep"></div>

    <!-- Party / fleet -->
    <div>
      <div class="section-title">PARTY</div>
      <div id="party-content"></div>
    </div>

    <div class="sep"></div>

    <!-- Entity inspector -->
    <div>
      <div class="section-title">INSPECTOR</div>
      <div id="inspector"></div>
      <!-- Tower build menu (shown when node selected with no tower) -->
      <div id="tower-menu" style="margin-top:6px"></div>
    </div>

    <div class="sep"></div>

    <!-- Weapon picker -->
    <div id="weapon-picker"></div>

    <div class="sep"></div>

    <!-- Action buttons -->
    <div id="action-buttons"></div>

  </div><!-- /panel-body -->

  <!-- Hint footer -->
  <div class="hint" id="hint-footer">
    WASD/↑↓←→ move · Space: fire · Click: target<br>
    L: land/launch · J: jump · G: galaxy · T: tower
  </div>
</div>

<div id="toast"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
